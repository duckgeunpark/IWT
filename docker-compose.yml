services:
  mysql:
    image: mysql:8.0
    container_name: iwt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: iwt_dev
      MYSQL_USER: iwt_user
      MYSQL_PASSWORD: iwt_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - iwt-network
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: iwt-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: http://localhost:9000
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - iwt-network
    restart: unless-stopped

  minio-init:
    image: minio/mc
    container_name: iwt-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/iwt-dev --ignore-existing;
      exit 0;
      "
    networks:
      - iwt-network

  frontend:
    build: ./Front
    container_name: iwt-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./Front:/app
      - /app/node_modules
    env_file:
      - ./Front/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - iwt-network
    restart: unless-stopped

  backend:
    build: ./back
    container_name: iwt-backend
    ports:
      - "8000:8000"
    volumes:
      - ./back:/app
    env_file:
      - ./back/.env.dev
    environment:
      - PYTHONPATH=/app
      - 'ALLOWED_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]'
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=mysql
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - iwt-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iwt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - iwt-network
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data:
  redis_data:

networks:
  iwt-network:
    driver: bridge
    name: iwt-network
