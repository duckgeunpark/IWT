services:
  frontend:
    build: ./Front
    container_name: iwt-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./Front:/app
      - /app/node_modules
    env_file:
      - ./Front/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - iwt-network
    restart: unless-stopped

  backend:
    build: ./back
    container_name: iwt-backend
    ports:
      - "8000:8000"
    volumes:
      - ./back:/app
    env_file:
      - ./back/.env
    environment:
      - PYTHONPATH=/app
      - 'ALLOWED_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]'
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - iwt-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iwt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - iwt-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  iwt-network:
    driver: bridge
    name: iwt-network
